<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleAI – Clothing Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛡️ StyleAI</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search clothing...">
            <button id="searchBtn">🔍</button>
        </div>
        <div class="nav-icons">
            <span>❤️</span>
            <span>🛒 <span id="cartCount">0</span></span>
            <span>👤</span>
        </div>
    </nav>

    <div class="hero">
        <h1>Love yourself a little more with luxury</h1>
        <p>AI‑verified sellers | Scam-free | Easy returns</p>
        <button id="ctaBtn">✨ Find your gift</button>
    </div>

    <div class="section">
        <h2>Shop by Category</h2>
        <div class="categories" id="categoryContainer"></div>
    </div>

    <div class="section">
        <h2>Today's Deals – Free Shipping</h2>
        <div class="products" id="productsContainer"></div>
    </div>

    <div class="trust-badge">
        🤖 <strong>AI Agent Active</strong> – Verified sellers | Scam detection | Secure payments
    </div>

    <footer>© 2025 StyleAI | Safe Commerce with Agentive AI</footer>

    <script src="script.js"></script>
</body>
</html>
